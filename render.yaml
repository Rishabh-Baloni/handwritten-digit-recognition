services:
  - type: web
    name: digit-recognition
    env: python
    buildCommand: pip install -r requirements.txt && chmod +x startup.sh
    startCommand: ./startup.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: TF_CPP_MIN_LOG_LEVEL
        value: 2
      - key: TF_ENABLE_ONEDNN_OPTS
        value: 1
      - key: MALLOC_TRIM_THRESHOLD_
        value: 65536