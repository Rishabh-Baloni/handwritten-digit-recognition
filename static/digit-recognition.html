<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwritten Digit Recognition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a14;
            --panel-bg: rgba(20, 20, 40, 0.8);
            --royal-gold: #d4af37;
            --royal-purple: #4b0082;
            --royal-blue: #1a237e;
            --deep-burgundy: #800020;
            --silver: #c0c0c0;
            --glow-intensity: 3px;
        }
        
        @keyframes subtle-glow {
            0%, 100% {
                opacity: 0.95;
                text-shadow: 0 0 var(--glow-intensity) var(--royal-gold);
            }
            50% {
                opacity: 1;
                text-shadow: 0 0 calc(var(--glow-intensity) * 1.5) var(--royal-gold);
            }
        }
        
        @keyframes elegant-pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 8px var(--royal-gold);
            }
            50% {
                transform: scale(1.03);
                box-shadow: 0 0 12px var(--royal-gold);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 8px var(--royal-gold);
            }
        }
        
        @keyframes border-shine {
            0% {
                border-image-source: linear-gradient(45deg, var(--royal-gold), var(--royal-purple), var(--royal-gold));
            }
            50% {
                border-image-source: linear-gradient(45deg, var(--royal-purple), var(--royal-gold), var(--royal-purple));
            }
            100% {
                border-image-source: linear-gradient(45deg, var(--royal-gold), var(--royal-purple), var(--royal-gold));
            }
        }
        
        body {
            font-family: 'Cinzel', serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(75, 0, 130, 0.15) 0%, transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(26, 35, 126, 0.15) 0%, transparent 30%),
                linear-gradient(rgba(10, 10, 20, 0.95), rgba(10, 10, 20, 0.95));
            color: var(--silver);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1,1 L19,1 L19,19 L1,19 L1,1 Z' stroke='rgba(212, 175, 55, 0.05)' fill='none'/%3E%3C/svg%3E");
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 10;
            opacity: 0.5;
        }
        
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--royal-gold), transparent);
            pointer-events: none;
            z-index: 11;
        }
        
        h1 {
            font-family: 'Cinzel', serif;
            text-align: center;
            color: var(--royal-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-shadow: 0 0 var(--glow-intensity) rgba(212, 175, 55, 0.3);
            animation: subtle-glow 3s infinite alternate;
            font-weight: 700;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--panel-bg);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 5px;
            box-shadow: 
                0 0 20px rgba(0, 0, 0, 0.5),
                inset 0 0 15px rgba(212, 175, 55, 0.1);
            border: 1px solid var(--royal-gold);
            max-width: 800px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        
        .container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--royal-gold), transparent);
            z-index: 1;
        }
        
        #canvas-container {
            position: relative;
            margin: 20px 0;
        }
        
        #canvas-container::before {
            content: "";
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            background: linear-gradient(45deg, var(--royal-gold), var(--royal-purple), var(--royal-blue));
            border-radius: 5px;
            z-index: -1;
            opacity: 0.6;
        }
        
        #digit-canvas {
            border: none;
            border-radius: 3px;
            cursor: crosshair;
            background-color: rgba(10, 10, 20, 0.9);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--royal-gold);
        }
        
        .button-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        button {
            padding: 12px 25px;
            background-color: rgba(10, 10, 20, 0.7);
            color: var(--royal-gold);
            border: 1px solid var(--royal-gold);
            border-radius: 3px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
            z-index: 1;
            font-weight: 600;
        }
        
        button::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.1), transparent);
            transition: all 0.8s ease;
            z-index: -1;
        }
        
        button:hover {
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.5);
            background-color: rgba(20, 20, 40, 0.9);
            transform: translateY(-2px);
        }
        
        button:hover::before {
            left: 100%;
        }
        
        #recognize-button {
            border-color: var(--royal-gold);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
        }
        
        #recognize-button:hover {
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.6);
        }
        
        #clear-button {
            border-color: var(--royal-purple);
            box-shadow: 0 0 8px rgba(75, 0, 130, 0.3);
            color: var(--silver);
        }
        
        #clear-button:hover {
            box-shadow: 0 0 12px rgba(75, 0, 130, 0.5);
            background-color: rgba(30, 20, 50, 0.9);
        }
        
        #result-container {
            margin-top: 20px;
            text-align: center;
            background-color: rgba(10, 10, 20, 0.7);
            padding: 20px;
            border-radius: 5px;
            border: 1px solid var(--royal-gold);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 600px;
        }
        
        #prediction {
            font-family: 'Cinzel', serif;
            font-size: 28px;
            font-weight: bold;
            margin: 10px 0;
            color: var(--royal-gold);
            text-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
        }
        
        #confidence {
            font-size: 20px;
            color: var(--silver);
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            margin-bottom: 20px;
        }
        
        .probability-container {
            display: flex;
            justify-content: center; 
            flex-wrap: wrap;         
            gap: 1rem;             
            margin: 0 auto;          
            max-width: 1000px;        
            padding: 2rem 1rem;        
            box-sizing: border-box;
        }

        
        .digit-probability {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 7%;
        }
        
        .probability-bar {
            width: 100%;
            background-color: rgba(20, 20, 40, 0.5);
            height: 100px;
            position: relative;
            border-radius: 2px;
            overflow: hidden;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(212, 175, 55, 0.1);
        }
        
        .probability-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(0deg, var(--royal-blue), rgba(26, 35, 126, 0.5));
            transition: height 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 0 5px var(--royal-blue);
        }
        
        .digit-label {
            margin-top: 8px;
            font-weight: bold;
            color: var(--royal-gold);
            font-family: 'Cinzel', serif;
        }
        
        .probability-value {
            margin-top: 5px;
            font-size: 12px;
            color: var(--silver);
            font-family: 'Cormorant Garamond', serif;
        }
        
        .highest {
            background: linear-gradient(0deg, var(--royal-gold), rgba(212, 175, 55, 0.5));
            box-shadow: 0 0 8px var(--royal-gold);
        }
        
        .instructions {
            margin: 20px 0;
            padding: 15px;
            background-color: rgba(10, 10, 20, 0.6);
            border-left: 3px solid var(--royal-gold);
            border-radius: 2px;
            color: var(--royal-gold);
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.2em;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 15px;
                margin: 10px;
                border-width: 1px;
                width: 95%;
            }
            
            h1 {
                font-size: 22px;
                letter-spacing: 1px;
            }
            
            #digit-canvas {
                width: 250px;
                height: 250px;
            }
            
            .button-container {
                flex-direction: column;
                gap: 10px;
            }
            
            .probability-container {
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
                padding: 10px;
            }
            
            .digit-probability {
                width: 18%;
                margin: 5px;
            }
            
            .probability-bar {
                height: 80px;
            }
            
            .instructions {
                font-size: 0.9em;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="royal-pattern">
        <div class="container">
            <h1>Handwritten Digit Analyzer</h1>
            
            <div class="instructions">
                <p>Draw a single digit (0-9) in the box below, then click Analyze to process.</p>
            </div>
            
            <div id="canvas-container">
                <canvas id="digit-canvas" width="280" height="280"></canvas>
            </div>
            
            <div class="button-container">
                <button id="recognize-button">Analyze</button>
                <button id="clear-button">Clear</button>
            </div>
            
            <div id="result-container">
                <div id="prediction">Awaiting Input...</div>
                <div id="confidence">Analysis confidence: 0.00%</div>
                
                <div class="probability-container">
                <!-- Probability bars for digits 0-9 -->
                <div class="digit-probability">
                    <div class="probability-bar">
                        <div class="probability-fill" id="prob-0" style="height: 0%;"></div>
                    </div>
                    <div class="digit-label">0</div>
                    <div class="probability-value" id="prob-value-0">0%</div>
                </div>
                <div class="digit-probability">
                    <div class="probability-bar">
                        <div class="probability-fill" id="prob-1" style="height: 0%;"></div>
                    </div>
                    <div class="digit-label">1</div>
                    <div class="probability-value" id="prob-value-1">0%</div>
                </div>
                <div class="digit-probability">
                    <div class="probability-bar">
                        <div class="probability-fill" id="prob-2" style="height: 0%;"></div>
                    </div>
                    <div class="digit-label">2</div>
                    <div class="probability-value" id="prob-value-2">0%</div>
                </div>
                <div class="digit-probability">
                    <div class="probability-bar">
                        <div class="probability-fill" id="prob-3" style="height: 0%;"></div>
                    </div>
                    <div class="digit-label">3</div>
                    <div class="probability-value" id="prob-value-3">0%</div>
                </div>
                <div class="digit-probability">
                    <div class="probability-bar">
                        <div class="probability-fill" id="prob-4" style="height: 0%;"></div>
                    </div>
                    <div class="digit-label">4</div>
                    <div class="probability-value" id="prob-value-4">0%</div>
                </div>
                <div class="digit-probability">
                    <div class="probability-bar">
                        <div class="probability-fill" id="prob-5" style="height: 0%;"></div>
                    </div>
                    <div class="digit-label">5</div>
                    <div class="probability-value" id="prob-value-5">0%</div>
                </div>
                <div class="digit-probability">
                    <div class="probability-bar">
                        <div class="probability-fill" id="prob-6" style="height: 0%;"></div>
                    </div>
                    <div class="digit-label">6</div>
                    <div class="probability-value" id="prob-value-6">0%</div>
                </div>
                <div class="digit-probability">
                    <div class="probability-bar">
                        <div class="probability-fill" id="prob-7" style="height: 0%;"></div>
                    </div>
                    <div class="digit-label">7</div>
                    <div class="probability-value" id="prob-value-7">0%</div>
                </div>
                <div class="digit-probability">
                    <div class="probability-bar">
                        <div class="probability-fill" id="prob-8" style="height: 0%;"></div>
                    </div>
                    <div class="digit-label">8</div>
                    <div class="probability-value" id="prob-value-8">0%</div>
                </div>
                <div class="digit-probability">
                    <div class="probability-bar">
                        <div class="probability-fill" id="prob-9" style="height: 0%;"></div>
                    </div>
                    <div class="digit-label">9</div>
                    <div class="probability-value" id="prob-value-9">0%</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const canvas = document.getElementById('digit-canvas');
            const ctx = canvas.getContext('2d');
            const recognizeButton = document.getElementById('recognize-button');
            const clearButton = document.getElementById('clear-button');
            const predictionElement = document.getElementById('prediction');
            const confidenceElement = document.getElementById('confidence');
            
            let isDrawing = false;
            let lastX = 0;
            let lastY = 0;

            // Set up canvas
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 15;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = 'white';
            
            // Check if server is running
            fetch('/health')
                .then(response => response.json())
                .then(data => {
                    if (data.model_loaded) {
                        console.log('Model loaded successfully');
                    } else {
                        predictionElement.textContent = 'Error: Model not loaded';
                        predictionElement.style.color = 'var(--royal-burgundy)';
                    }
                })
                .catch(error => {
                    console.error('Error checking server status:', error);
                    predictionElement.textContent = 'Error: Server not responding';
                    predictionElement.style.color = 'var(--royal-burgundy)';
                });
            
            // Drawing functions
            function startDrawing(e) {
                isDrawing = true;
                [lastX, lastY] = [e.offsetX, e.offsetY];
            }
            
            function draw(e) {
                if (!isDrawing) return;
                
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(e.offsetX, e.offsetY);
                ctx.stroke();
                
                [lastX, lastY] = [e.offsetX, e.offsetY];
            }
            
            function stopDrawing() {
                isDrawing = false;
            }
            
            function clearCanvas() {
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Reset prediction display
                predictionElement.textContent = 'Draw a digit and click Analyze';
                predictionElement.style.color = '#d4af37';
                confidenceElement.textContent = '';
                
                // Reset probability bars
                for (let i = 0; i < 10; i++) {
                    document.getElementById(`prob-${i}`).style.height = '0%';
                    document.getElementById(`prob-${i}`).classList.remove('highest');
                    document.getElementById(`prob-value-${i}`).textContent = '0%';
                }
            }
            
            function recognizeDigit() {
                // Get image data from canvas
                const imageData = canvas.toDataURL('image/png');
                
                // Update UI to show loading state
                predictionElement.textContent = 'Analyzing...';
                confidenceElement.textContent = 'Processing your input';
                
                // Send image to server for prediction
                fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ image: imageData })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        predictionElement.textContent = `Error: ${data.error}`;
                        predictionElement.style.color = 'var(--royal-burgundy)';
                        return;
                    }
                    
                    // Update prediction display
                    predictionElement.textContent = `Detected: ${data.digit}`;
                    predictionElement.style.color = 'var(--royal-gold)';
                    confidenceElement.textContent = `Analysis confidence: ${data.confidence.toFixed(2)}%`;
                    
                    // Update probability bars
                    for (let i = 0; i < 10; i++) {
                        const probability = data.probabilities[i];
                        const barElement = document.getElementById(`prob-${i}`);
                        const valueElement = document.getElementById(`prob-value-${i}`);
                        
                        barElement.style.height = `${probability}%`;
                        valueElement.textContent = `${probability.toFixed(2)}%`;
                        
                        // Highlight the highest probability
                        if (i === data.digit) {
                            barElement.classList.add('highest');
                        } else {
                            barElement.classList.remove('highest');
                        }
                    }
                })
                .catch(error => {
                    console.error('Error recognizing digit:', error);
                    predictionElement.textContent = 'Analysis Failed';
                    predictionElement.style.color = 'var(--royal-burgundy)';
                    confidenceElement.textContent = 'Please try again';
                });
            }
            
            // Event listeners
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);
            
            // Touch support
            canvas.addEventListener('touchstart', function(e) {
                e.preventDefault();
                const touch = e.touches[0];
                const mouseEvent = new MouseEvent('mousedown', {
                    clientX: touch.clientX,
                    clientY: touch.clientY
                });
                canvas.dispatchEvent(mouseEvent);
            });
            
            canvas.addEventListener('touchmove', function(e) {
                e.preventDefault();
                const touch = e.touches[0];
                const mouseEvent = new MouseEvent('mousemove', {
                    clientX: touch.clientX,
                    clientY: touch.clientY
                });
                canvas.dispatchEvent(mouseEvent);
            });
            
            canvas.addEventListener('touchend', function(e) {
                e.preventDefault();
                const mouseEvent = new MouseEvent('mouseup');
                canvas.dispatchEvent(mouseEvent);
            });
            
            // Button event listeners
            recognizeButton.addEventListener('click', recognizeDigit);
            clearButton.addEventListener('click', clearCanvas);
        });
    </script>
</body>
</html>
